services:
  - type: web
    name: njaheg-backend
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://njaheg-theta.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://njaheg-theta.vercel.app,https://njaheg.vercel.app
