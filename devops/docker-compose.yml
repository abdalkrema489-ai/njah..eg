# ═══════════════════════════════════════════════════════════════
# Najah Platform — Full Stack Docker Compose
# Usage:
#   Dev:   docker compose up
#   Prod:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════

networks:
  najah: { driver: bridge }

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  nginx-logs:
  app-logs:
  ollama_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: najah-postgres
    restart: unless-stopped
    networks: [najah]
    environment:
      POSTGRES_DB:       ${DB_NAME:-najah_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-najah_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: najah-mongo
    restart: unless-stopped
    networks: [najah]
    environment:
      MONGO_INITDB_DATABASE:      najah_chat
    volumes: [mongo-data:/data/db]
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: najah-redis
    restart: unless-stopped
    networks: [najah]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes: [redis-data:/data]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../devops/docker/backend/Dockerfile
    container_name: najah-backend
    restart: unless-stopped
    networks: [najah]
    env_file: ./.env.production
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-najah_db}
      MONGODB_URI:  mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD}@mongo:27017/najah_chat?authSource=admin
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
    volumes: [app-logs:/app/logs]
    ports: ["5000:5000"]
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      dockerfile: ../devops/docker/frontend/Dockerfile
      args:
        VITE_API_URL:          ${VITE_API_URL:-https://yourdomain.com/api}
        VITE_SOCKET_URL:       ${VITE_SOCKET_URL:-https://yourdomain.com}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: najah-frontend
    restart: unless-stopped
    networks: [najah]
    ports: ["3000:80"]
    depends_on:
      backend: { condition: service_healthy }

  nginx:
    image: nginx:1.25-alpine
    container_name: najah-nginx
    restart: unless-stopped
    networks: [najah]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports: ["80:80","443:443"]
    depends_on: [backend, frontend]
    healthcheck:
      test: ["CMD","nginx","-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MarkItDown: Microsoft file-to-markdown converter ──────────
  markitdown:
    build:
      context: ../backend/python
      dockerfile: Dockerfile
    container_name: najah-markitdown
    restart: unless-stopped
    networks: [najah]
    ports: ["5001:5001"]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Ollama: Local AI fallback (free, no GPU required) ─────────
  ollama:
    image: ollama/ollama:latest
    container_name: najah-ollama
    restart: unless-stopped
    networks: [najah]
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # After first deploy, pull model:
    # docker exec najah-ollama ollama pull gemma2:2b
