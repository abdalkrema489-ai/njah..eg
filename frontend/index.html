<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color"                     content="#6366F1" />
    <meta name="mobile-web-app-capable"          content="yes" />
    <meta name="application-name"               content="نجاح" />

    <!-- Apple / iOS -->
    <meta name="apple-mobile-web-app-capable"         content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"           content="نجاح" />
    <link rel="apple-touch-icon"                      href="/pwa-512x512.png" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor"  content="#6366F1" />
    <meta name="msapplication-TileImage" content="/pwa-512x512.png" />

    <!-- SEO -->
    <meta name="description" content="نجاح — منصة التعلم الذكية للطلاب المصريين. ادرس بذكاء، حقق أكثر." />
    <meta property="og:title"       content="نجاح | منصة التعلم الذكية 🎓" />
    <meta property="og:description" content="منصة تعليمية مدعومة بالذكاء الاصطناعي — مخطط، ملاحظات، تركيز، دردشة وأكثر." />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="/pwa-512x512.png" />
    <meta name="robots"             content="index, follow" />

    <title>نجاح | منصة التعلم الذكية 🎓</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical Arabic font (Cairo 700 Latin+Arabic subset) -->
    <link rel="preload" as="font" type="font/woff2"
      href="https://fonts.gstatic.com/s/cairo/v28/SLXgc1nY6HkvalIhTp2mxdt0UX8.woff2"
      crossorigin />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { font-size: 15px; }
      body {
        background: #030308;
        overflow-x: hidden;
        /* iOS safe area */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        /* Prevent overscroll bounce on iOS standalone */
        overscroll-behavior: none;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      /* Splash-screen skeleton while React loads */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at 30% 30%, rgba(99,102,241,0.12) 0%, transparent 60%),
                    #030308;
      }
      #root:empty::after {
        content: '🎓';
        font-size: 72px;
        animation: pulse-icon 1.6s ease-in-out infinite;
      }
      @keyframes pulse-icon {
        0%,100% { transform: scale(1);   opacity: 1; }
        50%      { transform: scale(1.1); opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <noscript>يجب تمكين JavaScript لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
