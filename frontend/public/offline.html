<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>نجاح — غير متصل بالإنترنت</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030308;
      color: #fff;
      font-family: 'Noto Kufi Arabic', 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.12) 0%, transparent 55%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #A78BFA, #6366F1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: rgba(255,255,255,0.55);
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }

    .feature {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .feature span { display: block; font-size: 22px; margin-bottom: 6px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .status {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #EF4444;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      لا تقلق! منصة نجاح تعمل بدون إنترنت.<br/>
      يمكنك الوصول إلى المحتوى المحفوظ أدناه.
    </p>

    <div class="features">
      <div class="feature">
        <span>📚</span>
        ملاحظاتك المحفوظة
      </div>
      <div class="feature">
        <span>📅</span>
        جدولك الدراسي
      </div>
      <div class="feature">
        <span>🧠</span>
        الاختبارات المحفوظة
      </div>
      <div class="feature">
        <span>⏱️</span>
        مؤقت التركيز
      </div>
    </div>

    <a href="/" class="btn" onclick="window.location.reload(); return false;">
      🔄 حاول مرة أخرى
    </a>

    <div class="status">
      <div class="dot"></div>
      غير متصل — محتوى مخزن مؤقتاً متاح
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      window.location.href = '/';
    });

    // Check connectivity every 5 seconds
    setInterval(() => {
      if (navigator.onLine) window.location.href = '/';
    }, 5000);
  </script>
</body>
</html>
